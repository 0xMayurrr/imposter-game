<div class="absolute top-0 left-0 w-1 h-full bg-primary/40"></div>
<h2 class="font-headline text-4xl font-black text-on-surface mb-10 tracking-tight">Create Room</h2>
<div class="space-y-10">
<div class="space-y-4">
<label class="block font-headline font-bold text-on-surface-variant text-sm tracking-widest uppercase">Your identity</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-lg px-6 py-5 text-lg font-medium placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="Your name" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline" data-icon="edit_note">edit_note</span>
</div>
</div>
<div class="flex flex-col gap-4">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold py-5 rounded-full text-lg shadow-lg hover:shadow-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2">

</button>
<button class="w-full border-2 border-outline-variant/15 text-primary font-headline font-bold py-5 rounded-full text-lg hover:bg-surface-container-low transition-colors">
                            Back
                        </button>
</div>
</div>
<div class="mt-12 p-6 rounded-lg bg-surface-container-low/50">
<p class="text-on-surface-variant text-sm leading-relaxed italic">
                        "The heavy scent of cedar and old paper fills the air. Are you ready to host the evening's deception?"
                    </p>
</div>
</section>
<div class="hidden lg:flex flex-col justify-center items-center opacity-20">
<div class="w-px h-32 bg-outline-variant"></div>
<span class="my-4 font-headline font-black text-2xl">OR</span>
<div class="w-px h-32 bg-outline-variant"></div>
</div>
<section class="flex-1 bg-surface-container-low rounded-xl p-8 lg:p-12 relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-secondary/30"></div>
<h2 class="font-headline text-4xl font-black text-on-surface mb-10 tracking-tight">Join Room</h2>
<div class="space-y-10">
<div class="space-y-8">
<div class="space-y-4">
<label class="block font-headline font-bold text-on-surface-variant text-sm tracking-widest uppercase">Your identity</label>
<input class="w-full bg-surface-container-highest/50 border-none rounded-lg px-6 py-5 text-lg font-medium placeholder:text-outline focus:ring-2 focus:ring-secondary/20 transition-all outline-none" placeholder="Your name" type="text"/>
</div>
<div class="space-y-4">
<label class="block font-headline font-bold text-on-surface-variant text-sm tracking-widest uppercase">Secret Key</label>
<div class="relative">
<input class="w-full bg-surface-container-highest/50 border-none rounded-lg px-6 py-5 text-3xl font-black tracking-[0.5em] placeholder:text-outline/30 focus:ring-2 focus:ring-secondary/20 transition-all outline-none uppercase text-center" placeholder="ABC123" type="text"/>
</div>
<p class="text-xs text-outline text-center font-medium">Enter the 6-digit code shared by the host</p>
</div>
</div>
<button class="w-full border-2 border-primary text-primary font-headline font-bold py-5 rounded-full text-lg hover:bg-primary hover:text-on-primary active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="key">key</span>
                        Join Room

</div>

</div>
<div class="h-24 rounded-lg bg-surface-variant overflow-hidden">
<img class="w-full h-full object-cover" data-alt="An ancient brass key lying on a dark rustic wooden table with long dramatic shadows and warm candle lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDFdPfGV-IOX1rH0w3UPo0Ie9dg_mY8AqGUNg7EIU_3e29_XTaGvcIFDTuZS2sAedPE0NRDs1OqJZzsjHHkGSlw904JY0c-uVOR3SZGq0d-TYoNEBXYVS8emhKq88unjqbhtgoVzQ9VZV1SvCW3XgTBY8sLA8p7zTT-n1xO-ZlWJhzHTIFgod0hJO6H4g3-TRUKOZDsukX3VO1HKYta8UdSZOmoUN-H4xixshEKxmk3ZYUTLaeuvAKPss1JbKJUS3vIvHfmNK4k588"/>
</div>
</div>
</section>
</div>
